name: ci

on:
  push:
    branches:
      - master
      - beta
      - next
      - alpha
      - next-major
      - '+([0-9])?(.{+([0-9]),x}).x'
  pull_request: {}
  workflow_dispatch: {}

jobs:
  test:
    if: ${{ !contains(github.head_ref, 'all-contributors') }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: [22, 24]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        env:
          HUSKY: 0

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate package
        run: npm run validate:package

      - name: Test with coverage
        run: npm run coverage

      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  release:
    needs: test
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.repository == 'vitaliiburlaka/react-noti' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Build
        run: npm run build

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy:
    needs: release
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master' && github.repository == 'vitaliiburlaka/react-noti' }}
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        env:
          HUSKY: 0

      - name: Build demo
        run: npm run examples:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/build

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
